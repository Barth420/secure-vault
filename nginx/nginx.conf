events { worker_connections 1024; }

http {
  include       /etc/nginx/mime.types;
  default_type  application/octet-stream;
  sendfile      on;
  gzip          on;
  gzip_types    text/plain text/css application/json application/javascript;

  # Docker internal DNS resolver — required so NGINX doesn't crash
  # if upstream containers aren't ready at startup time
  resolver 127.0.0.11 valid=30s;

  server {
    listen 80;
    server_name _;

    # Max upload size (match server MAX_FILE_SIZE)
    client_max_body_size 110m;

    # ── API → Backend ─────────────────────────────────────
    location /api/ {
      set $backend http://server:4000;
      proxy_pass         $backend;
      proxy_http_version 1.1;
      proxy_set_header   Host              $host;
      proxy_set_header   X-Real-IP         $remote_addr;
      proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header   X-Forwarded-Proto $scheme;
      proxy_read_timeout 120s;
    }

    # ── Everything else → Frontend ─────────────────────────
    location / {
      set $frontend http://client:80;
      proxy_pass         $frontend;
      proxy_http_version 1.1;
      proxy_set_header   Host $host;

      # SPA fallback — if frontend returns 404, re-request root
      proxy_intercept_errors on;
      error_page 404 = @spa_fallback;
    }

    location @spa_fallback {
      set $frontend http://client:80;
      proxy_pass $frontend;
    }
  }
}
